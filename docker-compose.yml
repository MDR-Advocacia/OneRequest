services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onerequest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_segura}
      POSTGRES_DB: ${POSTGRES_DB:-onerequest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onerequest}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build: .
    command: python server.py
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onerequest}:${POSTGRES_PASSWORD:-senha_segura}@db:5432/${POSTGRES_DB:-onerequest}
    restart: unless-stopped

volumes:
  pgdata:
